name: Build and Release Plugin

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  PLUGIN_NAME: Lidarr.Plugin.AppleMusic

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.405'

      - name: Restore
        run: dotnet restore src/${{ env.PLUGIN_NAME }}/${{ env.PLUGIN_NAME }}.csproj /p:TreatWarningsAsErrors=false /p:NuGetAudit=false

      - name: Build
        run: dotnet build src/${{ env.PLUGIN_NAME }}/${{ env.PLUGIN_NAME }}.csproj --configuration Release --no-restore /p:TreatWarningsAsErrors=false /p:NuGetAudit=false /p:AssemblyVersion=1.0.0.0 /p:Deterministic=true

      - name: Package
        run: |
          mkdir -p staging
          cp _plugins/${{ env.PLUGIN_NAME }}/${{ env.PLUGIN_NAME }}.dll staging/
          cp _plugins/${{ env.PLUGIN_NAME }}/${{ env.PLUGIN_NAME }}.deps.json staging/
          cd staging
          zip ../${{ env.PLUGIN_NAME }}-${{ github.ref_name }}.net8.0.zip *

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ env.PLUGIN_NAME }} ${{ github.ref_name }}"
          files: ${{ env.PLUGIN_NAME }}-${{ github.ref_name }}.net8.0.zip
          generate_release_notes: true
